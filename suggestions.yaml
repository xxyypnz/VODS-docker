0000:
  title: "未发现指定目标"
  desc: "未发现指定目标"
  according: "施工现场安全管理规范及用电安全相关要求"
  suggestions: "无"

1002:
  title: "人员抽烟"
  desc: "现场人员违规吸烟，存在火灾、爆炸安全隐患。"
  according: "施工现场消防安全管理规定"
  suggestions: "立即制止吸烟行为，加强现场巡查与安全教育。"

2004:
  title: "布线杂乱"
  desc: "现场警示锥形桶缺失、倾倒或摆放不规范。"
  according: "施工现场安全警示标识管理规范"
  suggestions: "规范摆放锥形桶，做好区域隔离与警示。"

2005:
  title: "外接线缆布放不规范"
  desc: "绝缘手套缺失、破损或未按规定使用。"
  according: "《用电安全导则》GB/T 13869"
  suggestions: "配备合格绝缘手套，定期检测，作业时规范佩戴。"

2007:
  title: "人员"
  desc: "维护人员在进行巡检"
  according: "钢结构防腐及安全检测规范"
  suggestions: "维护人员在进行巡检"

2008:
  title: "佩戴安全帽的工作人员"
  desc: "铁塔巡检安全帽"
  according: "钢结构防腐及安全检测规范"
  suggestions: "维护人员应该正确佩戴安全帽"

2009:
  title: "机柜"
  desc: "配电箱"
  according: "钢结构防腐及安全检测规范"
  suggestions: "配电箱布局应该合理"

3007:
  title: "锈蚀"
  desc: "塔体或者配电箱等金属锈蚀，降低结构强度与安全性。"
  according: "钢结构防腐及安全检测规范"
  suggestions: "除锈防腐，严重部位更换，定期维护。"
