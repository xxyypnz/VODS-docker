services:
  vods:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vods-server

    # 1. 移除 network_mode: "host"，改为默认的 bridge 网络模式，并映射端口
    ports:
      - "8000:8000"

    user: "${UID:-1000}:${GID:-1000}"

    # 2. 从 .env 读取非敏感配置
    env_file:
      - ../.env

    environment:
      - USE_DIFY=true
      # 3. 网络解耦：利用 host.docker.internal 访问宿主机上的 Dify 和图片服务
      - DIFY_API_URL=http://host.docker.internal:80/v1/workflows/run
      - BASE_IMAGE_URL=http://host.docker.internal:82
      
      # 🚨 API-KEY 保护：不要硬编码在这里！从外部读取！
      - DIFY_API_KEY=${DIFY_API_KEY} 
      
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp

    # 这里的配置非常关键，让 Linux 上的 host.docker.internal 能解析到宿主机
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - /home/pgh/work/docker_vds/src:/app/src
      - /home/pgh/work/docker_vds/output:/app/output
      - /home/pgh/work/docker_vds/logs:/app/logs
      - /home/pgh/work/docker_vds/videos:/app/videos:ro
      - /home/pgh/work/docker_vds/suggestions.yaml:/app/suggestions.yaml:ro
    
    restart: unless-stopped
    
    # 取消网络注释，使用独立的桥接网络
    networks:
      - vods-network

networks:
  vods-network:
    driver: bridge